const { useState, useEffect, useCallback, useRef } = React;

// ---- Supabase config ----
const SUPABASE_URL = "https://hbqgdqdwgiluknlfhdws.supabase.co";
const SUPABASE_KEY = "sb_publishable_WfLWUcjmNRVkBdWHHla_Ig__BbmQnRm";

const sbFetch = async (path, options = {}) => {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...options,
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
      "Prefer": "return=representation",
      ...(options.headers || {}),
    },
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(`Supabase error: ${res.status} ${err}`);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
};

// Tasks: one row per task, id = task.id
async function loadTasksRemote() {
  const rows = await sbFetch("tasks?order=position.asc&select=id,data");
  return rows.map(r => r.data);
}

async function saveTasksRemote(tasks) {
  // Upsert all tasks with explicit position
  const rows = tasks.map((t, i) => ({ id: t.id, data: t, position: i }));
  await sbFetch("tasks", {
    method: "POST",
    headers: { "Prefer": "resolution=merge-duplicates,return=minimal" },
    body: JSON.stringify(rows),
  });
  // Delete removed tasks
  const existing = await sbFetch("tasks?select=id");
  const currentIds = new Set(tasks.map(t => t.id));
  const toDelete = existing.filter(r => !currentIds.has(r.id)).map(r => r.id);
  if (toDelete.length > 0) {
    await sbFetch(`tasks?id=in.(${toDelete.join(",")})`, { method: "DELETE" });
  }
}

async function loadPrioritiesRemote() {
  const rows = await sbFetch("quarter_priorities?select=id,data&order=id.asc");
  return rows.map(r => ({ ...r.data, id: r.id }));
}

async function savePrioritiesRemote(priorities) {
  const rows = priorities.map(p => ({ id: p.id, data: p }));
  await sbFetch("quarter_priorities", {
    method: "POST",
    headers: { "Prefer": "resolution=merge-duplicates,return=minimal" },
    body: JSON.stringify(rows),

  const currentIds = new Set(priorities.map(p => p.id));
  const toDelete = existing.filter(r => !currentIds.has(r.id)).map(r => r.id);
  if (toDelete.length > 0) {
    await sbFetch(`quarter_priorities?id=in.(${toDelete.join(",")})`, { method: "DELETE" });

}

const TAG_COLORS = [
  { color: "#cc8450", bg: "#cc845010" },
  { color: "#5a9ea8", bg: "#5a9ea810" },
  { color: "#8a80b8", bg: "#8a80b810" },
  { color: "#7aab6a", bg: "#7aab6a10" },
  { color: "#b86880", bg: "#b8688010" },
  { color: "#baa048", bg: "#baa04810" },
];

const STATES = ["TODO", "WIP", "STANDBY", "DONE"];
const STATE_LABELS = { TODO: "todo", WIP: "wip", STANDBY: "stand by", DONE: "done" };
const STATE_COLORS = {
  TODO: "#8a8580",
  WIP: "#d4a84a",
  STANDBY: "#c47048",
  DONE: "#7aab6a",
};

const generateId = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);

const DAYS_ES = ["Domingo", "Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];
const DAYS_ES_PLURAL = ["Domingos", "Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábados"];
const DAYS_EN = ["sunday", "monday", "tuesday", "wednesday", "thursday", "friday", "saturday"];

// Returns "YYYY-MM-DD" in local timezone
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

// Given existing tasks and recurring templates, spawn any due instances
function spawnRecurringTasks(tasks) {
  const today = todayStr();
  const todayDate = new Date();
  const newTasks = [];

  const templates = tasks.filter(t => t.recurrence && !t.recurrenceParentId);
  for (const tpl of templates) {
    // Find the most recent instance for this template
    const instances = tasks
      .filter(t => t.recurrenceParentId === tpl.id && t.spawnedDate)
      .sort((a, b) => b.spawnedDate.localeCompare(a.spawnedDate));
    const lastInstance = instances[0];

    if (lastInstance) {
      // If spawned in the last 7 days, skip - it is still this week's instance
      const lastDate = new Date(lastInstance.spawnedDate);
      const daysSince = Math.floor((todayDate - lastDate) / (1000 * 60 * 60 * 24));
      if (daysSince < 7) continue;
    }

    newTasks.push({
      id: generateId(),
      title: tpl.title,
      tags: [...(tpl.tags || [])],
      subtasks: (tpl.subtasks || []).map(s => ({ ...s, id: generateId(), done: false })),
      state: "TODO",
      createdAt: Date.now(),
      order: Date.now(),
      recurrenceParentId: tpl.id,
      spawnedDate: today,
    });
  }
  return newTasks;
}

// ---- Components ----

function SyncIndicator({ status }) {
  const configs = {
    idle:    { color: "#4a4744", label: "" },
    syncing: { color: "#c8a050", label: "sincronizando…" },
    ok:      { color: "#7aab6a", label: "sincronizado" },
    error:   { color: "#c47048", label: "sin conexión — datos locales" },
  };
  const c = configs[status] || configs.idle;
  if (status === "idle") return null;
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
      <div style={{ width: 6, height: 6, borderRadius: "50%", background: c.color, flexShrink: 0,
        animation: status === "syncing" ? "pulse 1s infinite" : "none" }} />
      <span style={{ color: c.color, fontSize: 12, fontWeight: 600 }}>{c.label}</span>
      <style>{`@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }`}</style>
    </div>
  );
}

function TagBadge({ tagId, small, availableTags = [] }) {
  const tag = availableTags.find((t) => t.id === tagId);
  if (!tag) return null;
  return (
    <span style={{
      background: tag.bg, color: tag.color,
      border: `1px solid ${tag.color}30`,
      padding: small ? "1px 6px" : "2px 8px",
      borderRadius: 10, fontSize: small ? 12 : 13,
      fontWeight: 600, letterSpacing: 0.3, whiteSpace: "nowrap",
    }}>
      {tag.label}
    </span>
  );
}

function TaskCard({ task, onUpdate, onDelete, onSetActive, isActive, dragHandleProps, availableTags, index, onMoveUp, onMoveDown }) {
  const [editing, setEditing] = useState(false);
  const [editTitle, setEditTitle] = useState(task.title);
  const [stateOpen, setStateOpen] = useState(false);
  const [tagsOpen, setTagsOpen] = useState(false);
  const [expanded, setExpanded] = useState(false);
  const [newSub, setNewSub] = useState("");
  const dropdownRef = useRef(null);
  const tagDropdownRef = useRef(null);
  const subInputRef = useRef(null);

  const subtasks = task.subtasks || [];
  const doneCount = subtasks.filter((s) => s.done).length;
  const hasSubtasks = subtasks.length > 0;

  const handleTitleSave = () => {
    if (editTitle.trim()) onUpdate({ ...task, title: editTitle.trim() });
    setEditing(false);
  };

  const addSubtask = () => {
    if (!newSub.trim()) return;
    const updated = [...subtasks, { id: generateId(), text: newSub.trim(), done: false }];
    onUpdate({ ...task, subtasks: updated });
    setNewSub("");
    subInputRef.current?.focus();
  };

  const toggleSubtask = (subId) => {
    const updated = subtasks.map((s) => s.id === subId ? { ...s, done: !s.done } : s);
    const newState = task.state === "TODO" ? "WIP" : task.state;
    onUpdate({ ...task, subtasks: updated, state: newState });
  };

  const deleteSubtask = (subId) => {
    onUpdate({ ...task, subtasks: subtasks.filter((s) => s.id !== subId) });
  };

  useEffect(() => {
    if (!stateOpen) return;
    const handler = (e) => { if (dropdownRef.current && !dropdownRef.current.contains(e.target)) setStateOpen(false); };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, [stateOpen]);

  useEffect(() => {
    if (!tagsOpen) return;
    const handler = (e) => { if (tagDropdownRef.current && !tagDropdownRef.current.contains(e.target)) setTagsOpen(false); };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, [tagsOpen]);

  const toggleTag = (tagId) => {
    const newTags = task.tags.includes(tagId) ? task.tags.filter((t) => t !== tagId) : [...task.tags, tagId];
    onUpdate({ ...task, tags: newTags });
  };

  return (
    <div
      style={{
        background: isActive ? "#262828" : "#1e2020",
        border: isActive ? "1px solid #f59e0b50" : "1px solid #1e2333",
        borderRadius: 14, transition: "all 0.2s ease", position: "relative",
      }}
      onMouseEnter={(e) => {
        e.currentTarget.style.borderColor = isActive ? "#c8a05050" : "#3a3c3c";
        const del = e.currentTarget.querySelector("[data-task-delete]");
        if (del) del.style.opacity = "1";
      }}
      onMouseLeave={(e) => {
        e.currentTarget.style.borderColor = isActive ? "#c8a05035" : "#2c2e2e";
        const del = e.currentTarget.querySelector("[data-task-delete]");
        if (del) del.style.opacity = "0";
      }}
    >
      {isActive && (
        <div style={{ position: "absolute", left: -1, top: 8, bottom: 8, width: 2, background: "#c8a050", borderRadius: "0 2px 2px 0" }} />
      )}

      <div style={{ padding: "0 18px", height: 50, display: "flex", alignItems: "center", gap: 12 }}>
        <div {...dragHandleProps} style={{ color: "#4a4744", cursor: "grab", fontSize: 13, userSelect: "none", lineHeight: 1, letterSpacing: 1, flexShrink: 0, ...(dragHandleProps?.style || {}) }} title="Arrastrar para reordenar">⠿</div>

        {index != null && (
          <div style={{ color: "#4a4744", fontSize: 12, fontWeight: 700, fontVariantNumeric: "tabular-nums", minWidth: 20, textAlign: "right", flexShrink: 0, userSelect: "none" }}>{index}</div>
        )}

        <button
          onClick={() => { setExpanded(!expanded); if (!expanded) setTimeout(() => subInputRef.current?.focus(), 50); }}
          style={{ background: "transparent", border: "none", color: hasSubtasks ? "#6a6562" : "#2c2e2e", cursor: "pointer", fontSize: 10, padding: "2px 0", flexShrink: 0, transition: "color 0.15s", transform: expanded ? "rotate(90deg)" : "rotate(0deg)", width: 12, textAlign: "center" }}
          onMouseEnter={(e) => (e.currentTarget.style.color = "#9a9590")}
          onMouseLeave={(e) => (e.currentTarget.style.color = hasSubtasks ? "#6a6562" : "#2c2e2e")}
        >▶</button>

        {editing ? (
          <input value={editTitle} onChange={(e) => setEditTitle(e.target.value)} onBlur={handleTitleSave}
            onKeyDown={(e) => { if (e.key === "Enter") handleTitleSave(); if (e.key === "Escape") setEditing(false); }}
            autoFocus
            style={{ flex: 1, minWidth: 0, background: "#161818", border: "1px solid #2a3050", borderRadius: 10, color: "#e4e0db", padding: "3px 8px", fontSize: 15, fontFamily: "inherit", outline: "none" }}
          />
        ) : (
          <div onClick={() => setEditing(true)}
            style={{ flex: 1, minWidth: 0, color: task.state === "DONE" ? "#6a6562" : "#e4e0db", fontSize: 15, cursor: "text", textDecoration: task.state === "DONE" ? "line-through" : "none", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", display: "flex", alignItems: "center", gap: 6 }}
          >
            {task.title}
            {(task.recurrence || task.recurrenceParentId) && (
              <span title={task.recurrence ? `Recurrente · ${DAYS_ES_PLURAL[task.recurrence.day]}` : `Instancia recurrente`}
                style={{ color: "#5a9ea860", fontSize: 11, flexShrink: 0, letterSpacing: 0.5 }}>↻</span>
            )}
            {hasSubtasks && !expanded && (
              <span style={{ color: doneCount === subtasks.length ? "#7aab6a50" : "#47556980", fontSize: 12, fontWeight: 600, flexShrink: 0 }}>{doneCount}/{subtasks.length}</span>
            )}
          </div>
        )}

        <div ref={dropdownRef} style={{ position: "relative", flexShrink: 0, width: 95 }}>
          <button onClick={() => setStateOpen(!stateOpen)}
            style={{ background: `${STATE_COLORS[task.state]}12`, border: `1px solid ${STATE_COLORS[task.state]}30`, color: STATE_COLORS[task.state], borderRadius: 10, padding: "3px 8px", fontSize: 12, fontWeight: 700, cursor: "pointer", letterSpacing: 0.5, transition: "all 0.15s", whiteSpace: "nowrap", display: "flex", alignItems: "center", gap: 4, width: "100%", justifyContent: "space-between" }}
          >
            <span style={{ width: 7, height: 7, borderRadius: "50%", background: STATE_COLORS[task.state], flexShrink: 0 }} />
            {STATE_LABELS[task.state]}
            <span style={{ fontSize: 8, opacity: 0.4 }}>▼</span>
          </button>
          {stateOpen && (
            <div style={{ position: "absolute", top: "calc(100% + 4px)", right: 0, background: "#282a2a", border: "1px solid #1e2333", borderRadius: 12, padding: 4, zIndex: 50, minWidth: 100, boxShadow: "0 12px 32px #00000050, 0 0 0 1px #ffffff06" }}>
              {STATES.map((s) => (
                <button key={s} onClick={() => { onUpdate({ ...task, state: s }); setStateOpen(false); }}
                  style={{ display: "flex", alignItems: "center", gap: 8, width: "100%", textAlign: "left", background: task.state === s ? `${STATE_COLORS[s]}15` : "transparent", border: "none", color: task.state === s ? STATE_COLORS[s] : "#9a9590", padding: "5px 10px", fontSize: 13, fontWeight: 600, cursor: "pointer", borderRadius: 10, transition: "background 0.1s" }}
                  onMouseEnter={(e) => { if (task.state !== s) e.currentTarget.style.background = "#1e233380"; }}
                  onMouseLeave={(e) => { if (task.state !== s) e.currentTarget.style.background = "transparent"; }}
                >
                  <span style={{ width: 7, height: 7, borderRadius: "50%", background: STATE_COLORS[s], flexShrink: 0, opacity: task.state === s ? 1 : 0.5 }} />
                  {STATE_LABELS[s]}
                </button>
              ))}
            </div>
          )}
        </div>

        <div ref={tagDropdownRef} style={{ position: "relative", flexShrink: 0, width: 100 }}>
          <div onClick={() => setTagsOpen(!tagsOpen)} style={{ display: "flex", gap: 4, alignItems: "center", cursor: "pointer", overflow: "hidden", height: "100%" }}>
            {task.tags.length > 0
              ? task.tags.map((t) => <TagBadge key={t} tagId={t} small availableTags={availableTags} />)
              : <span style={{ color: "#4a4744", fontSize: 12, fontStyle: "italic" }}>+ proyecto</span>
            }
          </div>
          {tagsOpen && availableTags.length > 0 && (
            <div style={{ position: "absolute", top: "calc(100% + 8px)", right: 0, background: "#282a2a", border: "1px solid #1e2333", borderRadius: 12, padding: 4, zIndex: 50, minWidth: 160, boxShadow: "0 12px 32px #00000050, 0 0 0 1px #ffffff06" }}>
              {availableTags.map((tag) => {
                const selected = task.tags.includes(tag.id);
                return (
                  <button key={tag.id} onClick={() => toggleTag(tag.id)}
                    style={{ display: "flex", alignItems: "center", gap: 8, width: "100%", textAlign: "left", background: selected ? `${tag.color}15` : "transparent", border: "none", color: selected ? tag.color : "#9a9590", padding: "5px 10px", fontSize: 13, fontWeight: 600, cursor: "pointer", borderRadius: 10, transition: "background 0.1s" }}
                    onMouseEnter={(e) => { if (!selected) e.currentTarget.style.background = "#1e233380"; }}
                    onMouseLeave={(e) => { if (!selected) e.currentTarget.style.background = "transparent"; }}
                  >
                    <div style={{ width: 8, height: 8, borderRadius: 2, background: selected ? tag.color : "transparent", border: `1px solid ${selected ? tag.color : "#4a4744"}`, flexShrink: 0 }} />
                    {tag.label}
                  </button>
                );
              })}
            </div>
          )}
        </div>

        <button onClick={() => onSetActive(isActive ? null : task.id)}
          title={isActive ? "Desactivar foco" : "Activar foco"}
          style={{ background: isActive ? "#c8a05018" : "transparent", border: "none", color: isActive ? "#c8a050" : "#6a6562", cursor: "pointer", fontSize: 16, padding: "2px 4px", borderRadius: 10, transition: "all 0.15s", flexShrink: 0 }}
          onMouseEnter={(e) => (e.currentTarget.style.color = "#c8a050")}
          onMouseLeave={(e) => (e.currentTarget.style.color = isActive ? "#c8a050" : "#6a6562")}
        >◎</button>

        {(onMoveUp || onMoveDown) && (
          <div style={{ display: "flex", flexDirection: "column", flexShrink: 0, gap: 0 }}>
            <button onClick={onMoveUp} disabled={!onMoveUp}
              style={{ background: "transparent", border: "none", color: onMoveUp ? "#4a4744" : "#2c2e2e", cursor: onMoveUp ? "pointer" : "default", fontSize: 8, lineHeight: 1, padding: "1px 3px", transition: "color 0.15s" }}
              onMouseEnter={(e) => { if (onMoveUp) e.currentTarget.style.color = "#9a9590"; }}
              onMouseLeave={(e) => { if (onMoveUp) e.currentTarget.style.color = "#4a4744"; }}
            >▲</button>
            <button onClick={onMoveDown} disabled={!onMoveDown}
              style={{ background: "transparent", border: "none", color: onMoveDown ? "#4a4744" : "#2c2e2e", cursor: onMoveDown ? "pointer" : "default", fontSize: 8, lineHeight: 1, padding: "1px 3px", transition: "color 0.15s" }}
              onMouseEnter={(e) => { if (onMoveDown) e.currentTarget.style.color = "#9a9590"; }}
              onMouseLeave={(e) => { if (onMoveDown) e.currentTarget.style.color = "#4a4744"; }}
            >▼</button>
          </div>
        )}

        <button data-task-delete onClick={() => onDelete(task.id)}
          style={{ background: "transparent", border: "none", color: "#4a4744", cursor: "pointer", fontSize: 12, padding: "2px 4px", opacity: 0, transition: "opacity 0.15s, color 0.15s", flexShrink: 0 }}
          onMouseEnter={(e) => (e.currentTarget.style.color = "#b85a50")}
          onMouseLeave={(e) => (e.currentTarget.style.color = "#4a4744")}
        >✕</button>
      </div>

      {expanded && (
        <div style={{ padding: "0 14px 10px", marginLeft: 52, borderTop: "1px solid #1e233340" }}>
          {subtasks.map((sub) => (
            <div key={sub.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "5px 0" }}
              onMouseEnter={(e) => { const del = e.currentTarget.querySelector("[data-sub-delete]"); if (del) del.style.opacity = "1"; }}
              onMouseLeave={(e) => { const del = e.currentTarget.querySelector("[data-sub-delete]"); if (del) del.style.opacity = "0"; }}
            >
              <button onClick={() => toggleSubtask(sub.id)}
                style={{ width: 14, height: 14, borderRadius: 8, border: sub.done ? "1px solid #22c55e50" : "1px solid #334155", background: sub.done ? "#7aab6a18" : "transparent", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, padding: 0, transition: "all 0.15s" }}
              >
                {sub.done && <span style={{ color: "#7aab6a", fontSize: 10, lineHeight: 1 }}>✓</span>}
              </button>
              <span style={{ fontSize: 14, color: sub.done ? "#4a4744" : "#9a9590", textDecoration: sub.done ? "line-through" : "none", flex: 1, lineHeight: 1.3 }}>{sub.text}</span>
              <button data-sub-delete onClick={() => deleteSubtask(sub.id)}
                style={{ background: "transparent", border: "none", color: "#4a4744", cursor: "pointer", fontSize: 10, padding: "1px 3px", opacity: 0, transition: "opacity 0.15s, color 0.15s", flexShrink: 0 }}
                onMouseEnter={(e) => (e.currentTarget.style.color = "#b85a50")}
                onMouseLeave={(e) => (e.currentTarget.style.color = "#4a4744")}
              >✕</button>
            </div>
          ))}
          <div style={{ display: "flex", alignItems: "center", gap: 8, paddingTop: 4, opacity: 0.4, transition: "opacity 0.15s" }}
            onMouseEnter={(e) => (e.currentTarget.style.opacity = "0.8")}
            onMouseLeave={(e) => { if (!newSub) e.currentTarget.style.opacity = "0.4"; }}
            onFocus={(e) => (e.currentTarget.style.opacity = "1")}
            onBlur={(e) => { if (!newSub) e.currentTarget.style.opacity = "0.4"; }}
          >
            <div style={{ width: 16, height: 16, borderRadius: 8, border: "1px dashed #1e233380", flexShrink: 0 }} />

function QuarterPriorities({ priorities, onChange }) {
  const [editingId, setEditingId] = useState(null);

  const startEdit = (p) => { setEditingId(p.id); setEditValue(p.text); setTimeout(() => inputRef.current?.focus(), 30); };
  const saveEdit = () => {
    if (editingId !== null) onChange(priorities.map((p) => p.id === editingId ? { ...p, text: editValue } : p));
    setEditingId(null);
  };
  const addRow = () => {
    const nextId = priorities.length > 0 ? Math.max(...priorities.map((p) => p.id)) + 1 : 1;
    const updated = [...priorities, { id: nextId, text: "" }];
    onChange(updated); setEditingId(nextId); setEditValue("");
    setTimeout(() => inputRef.current?.focus(), 50);
  };
  const removeRow = (id) => {
    onChange(priorities.filter((p) => p.id !== id).map((p, i) => ({ ...p, id: i + 1 })));

  return (
    <div style={{ background: "#1c1e1e", border: "1px solid #1e2333", borderRadius: 16, padding: "10px 16px", marginBottom: 16 }}>

            <div style={{ color: idx === 0 ? "#c8a050" : idx === 1 ? "#847f7a" : "#4a4744", fontSize: 15, fontWeight: 800, width: 20, textAlign: "right", flexShrink: 0, fontVariantNumeric: "tabular-nums" }}>{idx + 1}</div>

                placeholder="Definir prioridad..."
                style={{ flex: 1, background: "#161818", border: "1px solid #2a3050", borderRadius: 10, color: "#e4e0db", padding: "3px 8px", fontSize: 15, fontFamily: "inherit", outline: "none" }}

function FocusMode({ task, onUpdate, onExit, availableTags }) {
  const [newSub, setNewSub] = useState("");

  const cycleState = () => {
    const idx = STATES.indexOf(task.state);
    onUpdate({ ...task, state: STATES[(idx + 1) % STATES.length] });
  };

  const toggleSubtask = (subId) => {
    const updated = subtasks.map((s) => s.id === subId ? { ...s, done: !s.done } : s);
    onUpdate({ ...task, subtasks: updated, state: task.state === "TODO" ? "WIP" : task.state });

    if (!newSub.trim()) return;

// ---- Main App ----
function CommandCenter() {
  const [tasks, setTasks] = useState([]);
  const [quarterPriorities, setQuarterPriorities] = useState(DEFAULT_PRIORITIES);
  const [loading, setLoading] = useState(true);
  const [syncStatus, setSyncStatus] = useState("idle");
  const [activeTaskId, setActiveTaskId] = useState(null);
  const [filterTag, setFilterTag] = useState(null);
  const [filterState, setFilterState] = useState(null);
  const [showDone, setShowDone] = useState(false);
  const [focusMode, setFocusMode] = useState(false);
  const [viewMode, setViewMode] = useState("backlog");
  const [checklistItems, setChecklistItems] = useState([]);
  const [newCheckItem, setNewCheckItem] = useState("");
  const checkInputRef = React.useRef(null);



  const addCheckItem = () => {
    if (!newCheckItem.trim()) return;
    setChecklistItems(prev => [...prev, { id: generateId(), text: newCheckItem.trim(), done: false }]);
    setNewCheckItem("");
    checkInputRef.current?.focus();
  };
  const toggleCheckItem = (id) => setChecklistItems(prev => prev.map(i => i.id === id ? { ...i, done: !i.done } : i));
  const deleteCheckItem = (id) => setChecklistItems(prev => prev.filter(i => i.id !== id));
  const clearDoneItems = () => setChecklistItems(prev => prev.filter(i => !i.done));

  const syncTimeoutRef = useRef(null);

  // Load on mount — try Supabase first, fall back to localStorage
  useEffect(() => {
    const init = async () => {
      setSyncStatus("syncing");
      try {
        const [remoteTasks, remotePriorities, remoteChecklist] = await Promise.all([
          loadTasksRemote(),
          loadPrioritiesRemote(),
          loadChecklistRemote(),
        ]);
        const tasks = remoteTasks.length > 0 ? remoteTasks : loadTasksLocal();
        const priorities = remotePriorities.length > 0 ? remotePriorities : loadPrioritiesLocal();
        // Spawn any due recurring tasks at top of backlog
        const spawned = spawnRecurringTasks(tasks);
        const finalTasks = spawned.length > 0 ? [...spawned, ...tasks] : tasks;
        setTasks(finalTasks);
        setChecklistItems(remoteChecklist);
        setQuarterPriorities(priorities);
        setSyncStatus("ok");
      } catch (err) {
        console.warn("Supabase load failed, using localStorage:", err);
        const localTasks = loadTasksLocal();
        const spawned = spawnRecurringTasks(localTasks);
        setTasks(spawned.length > 0 ? [...spawned, ...localTasks] : localTasks);
        setQuarterPriorities(loadPrioritiesLocal());
        setSyncStatus("error");
      } finally {
        setLoading(false);
      }
    };
    init();
  }, []);

  // Debounced save — always saves locally immediately, Supabase after 800ms
  const scheduleSave = useCallback((newTasks, newPriorities, newChecklist) => {
    saveTasksLocal(newTasks);
    savePrioritiesLocal(newPriorities);
    if (syncTimeoutRef.current) clearTimeout(syncTimeoutRef.current);
    setSyncStatus("syncing");
    syncTimeoutRef.current = setTimeout(async () => {
      try {
        await Promise.all([
          saveTasksRemote(newTasks),
          savePrioritiesRemote(newPriorities),
          saveChecklistRemote(newChecklist),
        ]);
        setSyncStatus("ok");
      } catch (err) {
        console.warn("Supabase save failed:", err);
        setSyncStatus("error");
      }
    }, 800);
  }, []);

  useEffect(() => {
    if (!loading) scheduleSave(tasks, quarterPriorities, checklistItems);
  }, [tasks, quarterPriorities, checklistItems, loading]);

  useEffect(() => {
    const handler = (e) => { if (e.key === "Escape") setFocusMode(false); };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, []);

  const addTask = useCallback((task) => setTasks((prev) => [...prev, task]), []);
  const updateTask = useCallback((updated) => setTasks((prev) => prev.map((t) => t.id === updated.id ? updated : t)), []);
  const deleteTask = useCallback((id) => {
    setTasks((prev) => prev.filter((t) => t.id !== id));
    if (activeTaskId === id) setActiveTaskId(null);
  }, [activeTaskId]);

  const moveTask = useCallback((taskId, direction) => {
    setTasks((prev) => {
      const idx = prev.findIndex((t) => t.id === taskId);
      if (idx < 0) return prev;
      const newIdx = idx + direction;
      if (newIdx < 0 || newIdx >= prev.length) return prev;
      const items = [...prev];
      const [moved] = items.splice(idx, 1);
      items.splice(newIdx, 0, moved);
      return items;
    });
  }, []);

  const dragItemRef = useRef(null);
  const dragOverItemRef = useRef(null);
  const [dragOverId, setDragOverId] = useState(null);

  const handleDragStart = useCallback((taskId) => { dragItemRef.current = taskId; }, []);
  const handleDragOver = useCallback((e, taskId) => { e.preventDefault(); dragOverItemRef.current = taskId; setDragOverId(taskId); }, []);
  const handleDragEnd = useCallback(() => {
    const fromId = dragItemRef.current;
    const toId = dragOverItemRef.current;
    setDragOverId(null);
    if (!fromId || !toId || fromId === toId) return;
    setTasks((prev) => {
      const items = [...prev];
      const fromIdx = items.findIndex((t) => t.id === fromId);
      const toIdx = items.findIndex((t) => t.id === toId);
      if (fromIdx < 0 || toIdx < 0) return prev;
      const [moved] = items.splice(fromIdx, 1);
      items.splice(toIdx, 0, moved);
      return items;
    });
    dragItemRef.current = null;
    dragOverItemRef.current = null;
  }, []);

  const activeTask = tasks.find((t) => t.id === activeTaskId);

  const availableTags = quarterPriorities
    .filter((p) => p.text.trim())
    .map((p, i) => ({ id: `qp-${p.id}`, label: p.text.trim(), ...(TAG_COLORS[i % TAG_COLORS.length]) }));

  const filteredTasks = tasks.filter((t) => {
    if (t.recurrence && !t.recurrenceParentId) return false; // templates hidden from backlog
    if (!showDone && t.state === "DONE") return false;
    if (filterTag && !t.tags.includes(filterTag)) return false;
    if (filterState && t.state !== filterState) return false;
    return true;
  });

  const counts = {
    total: tasks.filter(t => t.state !== "DONE").length,
    todo: tasks.filter((t) => t.state === "TODO").length,
    wip: tasks.filter((t) => t.state === "WIP").length,
    standby: tasks.filter((t) => t.state === "STANDBY").length,
    done: tasks.filter((t) => t.state === "DONE").length,
  };

  if (loading) {
    return (
      <div style={{ background: "#161818", minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", color: "#6a6562", fontFamily: "'DM Sans', sans-serif", gap: 10 }}>
        <div style={{ width: 6, height: 6, borderRadius: "50%", background: "#c8a050", animation: "pulse 1s infinite" }} />
        <style>{`@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }`}</style>
        Cargando...
      </div>
    );
  }

  if (focusMode && activeTask) {
    return <FocusMode task={activeTask} onUpdate={updateTask} onExit={() => setFocusMode(false)} availableTags={availableTags} />;
  }

  return (
    <div style={{ background: "#161818", minHeight: "100vh" }}>
    <div style={{ fontFamily: "'DM Sans', 'Segoe UI', sans-serif", color: "#e4e0db", padding: "32px 40px", maxWidth: 1200, margin: "0 auto" }}>

      {/* Header */}
      <div style={{ marginBottom: 16 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 4 }}>
          <div style={{ fontSize: 17, fontWeight: 700, color: "#ece8e3", letterSpacing: -0.3 }}>Command Center</div>
          <div style={{ flex: 1 }} />
          <SyncIndicator status={syncStatus} />
          <div style={{ color: "#4a4744", fontSize: 13, fontWeight: 600, letterSpacing: 0.5 }}>{counts.total} pendientes</div>
          <button
            onClick={() => { if (document.fullscreenElement) document.exitFullscreen(); else document.documentElement.requestFullscreen(); }}
            style={{ background: "transparent", border: "1px solid #1e2333", color: "#4a4744", borderRadius: 10, padding: "3px 6px", fontSize: 14, cursor: "pointer", lineHeight: 1, transition: "all 0.15s" }}
            onMouseEnter={(e) => { e.currentTarget.style.borderColor = "#3a3c3c"; e.currentTarget.style.color = "#847f7a"; }}
            onMouseLeave={(e) => { e.currentTarget.style.borderColor = "#2c2e2e"; e.currentTarget.style.color = "#4a4744"; }}
            title="Pantalla completa"
          >⛶</button>
        </div>
        <div style={{ height: 1, background: "linear-gradient(90deg, #f59e0b30, transparent 60%)" }} />
      </div>

      <QuarterPriorities priorities={quarterPriorities} onChange={setQuarterPriorities} />

      {/* Active task banner */}
      {activeTask && (
        <div style={{ background: "#c8a05008", border: "1px solid #f59e0b20", borderRadius: 16, padding: "12px 16px", marginBottom: 20 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <div style={{ color: "#c8a050", fontSize: 16 }}>◎</div>
            <div style={{ flex: 1 }}>
              <div style={{ color: "#c8a05070", fontSize: 12, fontWeight: 700, letterSpacing: 1, textTransform: "uppercase", marginBottom: 2 }}>Foco activo</div>
              <div style={{ color: "#ece8e3", fontSize: 15, fontWeight: 500 }}>{activeTask.title}</div>
            </div>
            <button onClick={() => setFocusMode(true)}
              style={{ background: "#c8a05014", border: "1px solid #f59e0b40", color: "#c8a050", borderRadius: 12, padding: "6px 14px", fontSize: 13, fontWeight: 700, cursor: "pointer", transition: "all 0.15s", whiteSpace: "nowrap" }}
              onMouseEnter={(e) => (e.currentTarget.style.background = "#c8a05022")}
              onMouseLeave={(e) => (e.currentTarget.style.background = "#c8a05014")}
            >Modo Foco</button>
          </div>
          {(activeTask.subtasks || []).length > 0 && (
            <div style={{ marginTop: 10, marginLeft: 28, display: "flex", flexDirection: "column", gap: 3 }}>
              {(activeTask.subtasks || []).map((sub) => (
                <div key={sub.id} onClick={() => {
                  const updated = (activeTask.subtasks || []).map((s) => s.id === sub.id ? { ...s, done: !s.done } : s);
                  updateTask({ ...activeTask, subtasks: updated, state: activeTask.state === "TODO" ? "WIP" : activeTask.state });
                }} style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", padding: "2px 0" }}>
                  <div style={{ width: 13, height: 13, borderRadius: 8, flexShrink: 0, border: sub.done ? "1px solid #22c55e50" : "1px solid #f59e0b30", background: sub.done ? "#7aab6a18" : "transparent", display: "flex", alignItems: "center", justifyContent: "center" }}>
                    {sub.done && <span style={{ color: "#7aab6a", fontSize: 8, lineHeight: 1 }}>✓</span>}
                  </div>
                  <span style={{ fontSize: 14, color: sub.done ? "#47556980" : "#9a9590", textDecoration: sub.done ? "line-through" : "none" }}>{sub.text}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* View tabs + state filters */}
      <div style={{ display: "flex", alignItems: "center", marginBottom: 20, borderBottom: "1px solid #1e2333" }}>
        {[{ id: "backlog", label: "Backlog" }, { id: "project", label: "Project" }, { id: "recurrentes", label: "Recurrentes" }, { id: "tools", label: "Tools" }].map((v) => (
          <button key={v.id} onClick={() => setViewMode(v.id)}
            style={{ background: "transparent", border: "none", borderBottom: viewMode === v.id ? "2px solid #f59e0b" : "2px solid transparent", color: viewMode === v.id ? "#ece8e3" : "#6a6562", padding: "8px 16px", fontSize: 14, fontWeight: 700, cursor: "pointer", letterSpacing: 0.3, transition: "all 0.15s", marginBottom: -1 }}
            onMouseEnter={(e) => { if (viewMode !== v.id) e.currentTarget.style.color = "#9a9590"; }}
            onMouseLeave={(e) => { if (viewMode !== v.id) e.currentTarget.style.color = "#6a6562"; }}
          >{v.label}</button>
        ))}
        <div style={{ flex: 1 }} />
        <div style={{ display: "flex", gap: 6, marginBottom: -1 }}>
          {[
            { label: "todo", count: counts.todo, color: STATE_COLORS.TODO, state: "TODO" },
            { label: "wip", count: counts.wip, color: STATE_COLORS.WIP, state: "WIP" },
            { label: "stand by", count: counts.standby, color: STATE_COLORS.STANDBY, state: "STANDBY" },
            { label: "done", count: counts.done, color: STATE_COLORS.DONE, state: "DONE" },
          ].map((s) => (
            <button key={s.state} onClick={() => {
              if (s.state === "DONE") { setShowDone(!showDone); setFilterState(showDone ? null : "DONE"); }
              else setFilterState(filterState === s.state ? null : s.state);
            }}
              style={{ background: filterState === s.state ? `${s.color}12` : "transparent", border: "none", borderBottom: filterState === s.state ? `2px solid ${s.color}` : "2px solid transparent", display: "flex", alignItems: "center", gap: 4, padding: "6px 8px", cursor: "pointer", transition: "all 0.15s" }}
            >
              <div style={{ width: 6, height: 6, borderRadius: "50%", background: s.color }} />
              <span style={{ color: "#847f7a", fontSize: 12, fontWeight: 600 }}>{s.label}</span>
              <span style={{ color: s.color, fontSize: 12, fontWeight: 700 }}>{s.count}</span>
            </button>
          ))}
        </div>
      </div>

      {/* Tag filters */}
      {viewMode === "backlog" && (
        <div style={{ display: "flex", gap: 6, marginBottom: 20, flexWrap: "wrap" }}>
          <button onClick={() => setFilterTag(null)}
            style={{ background: filterTag === null ? "#2c2e2e" : "transparent", border: `1px solid ${filterTag === null ? "#3a3c3c" : "#2c2e2e"}`, color: filterTag === null ? "#e4e0db" : "#6a6562", borderRadius: 10, padding: "3px 10px", fontSize: 13, fontWeight: 600, cursor: "pointer", transition: "all 0.15s" }}
          >Todos</button>
          {availableTags.map((tag) => (
            <button key={tag.id} onClick={() => setFilterTag(filterTag === tag.id ? null : tag.id)}
              style={{ background: filterTag === tag.id ? tag.bg : "transparent", border: `1px solid ${filterTag === tag.id ? tag.color + "40" : "#2c2e2e"}`, color: filterTag === tag.id ? tag.color : "#6a6562", borderRadius: 10, padding: "3px 10px", fontSize: 13, fontWeight: 600, cursor: "pointer", transition: "all 0.15s" }}
            >{tag.label}</button>
          ))}
        </div>
      )}

      {/* BACKLOG VIEW */}
      {viewMode === "backlog" && (
        <>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {filteredTasks.length === 0 && (
              <div style={{ color: "#4a4744", fontSize: 15, textAlign: "center", padding: 40 }}>
                {tasks.length === 0 ? "Añade tu primera tarea para empezar" : "No hay tareas con estos filtros"}
              </div>
            )}
            {filteredTasks.map((task, idx) => (
              <div key={task.id} onDragOver={(e) => handleDragOver(e, task.id)} style={{ opacity: dragOverId === task.id ? 0.5 : 1, transition: "opacity 0.15s" }}>
                <TaskCard task={task} index={idx + 1} onUpdate={updateTask} onDelete={deleteTask} onSetActive={setActiveTaskId} isActive={task.id === activeTaskId} availableTags={availableTags}
                  onMoveUp={tasks.indexOf(task) > 0 ? () => moveTask(task.id, -1) : null}
                  onMoveDown={tasks.indexOf(task) < tasks.length - 1 ? () => moveTask(task.id, 1) : null}
                  dragHandleProps={{ draggable: true, onDragStart: () => handleDragStart(task.id), onDragEnd: handleDragEnd }}
                />
              </div>
            ))}
          </div>
          <div style={{ marginTop: 8 }}>
            <NewTaskForm onAdd={addTask} availableTags={availableTags} />
          </div>
        </>
      )}

      {/* PROJECT VIEW */}
      {viewMode === "project" && (
        <div style={{ display: "flex", flexDirection: "column", gap: 24 }}>
          {availableTags.map((tag) => {
            const projectTasks = tasks.filter((t) => t.tags.includes(tag.id)).filter((t) => {
              if (!showDone && t.state === "DONE") return false;
              if (filterState && t.state !== filterState) return false;
              return true;
            });
            const wipCount = projectTasks.filter((t) => t.state === "WIP").length;
            const todoCount = projectTasks.filter((t) => t.state === "TODO").length;
            const standbyCount = projectTasks.filter((t) => t.state === "STANDBY").length;
            const doneCount = tasks.filter((t) => t.tags.includes(tag.id) && t.state === "DONE").length;
            return (
              <div key={tag.id}>
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10, paddingBottom: 8, borderBottom: `1px solid ${tag.color}20` }}>
                  <div style={{ width: 3, height: 16, borderRadius: 2, background: tag.color, flexShrink: 0 }} />
                  <div style={{ color: tag.color, fontSize: 15, fontWeight: 700 }}>{tag.label}</div>
                  <div style={{ display: "flex", gap: 8, marginLeft: 4 }}>
                    {wipCount > 0 && <span style={{ color: STATE_COLORS.WIP, fontSize: 12, fontWeight: 600 }}>{wipCount} wip</span>}
                    {todoCount > 0 && <span style={{ color: STATE_COLORS.TODO, fontSize: 12, fontWeight: 600 }}>{todoCount} todo</span>}
                    {standbyCount > 0 && <span style={{ color: STATE_COLORS.STANDBY, fontSize: 12, fontWeight: 600 }}>{standbyCount} stand by</span>}
                    {doneCount > 0 && <span style={{ color: STATE_COLORS.DONE, fontSize: 12, fontWeight: 600 }}>{doneCount} done</span>}
                  </div>
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                  {projectTasks.length === 0
                    ? <div style={{ color: "#2c2e2e", fontSize: 14, padding: "8px 0", fontStyle: "italic" }}>Sin tareas</div>
                    : projectTasks.map((task, idx) => (
                      <TaskCard key={task.id} task={task} index={idx + 1} onUpdate={updateTask} onDelete={deleteTask} onSetActive={setActiveTaskId} isActive={task.id === activeTaskId} availableTags={availableTags} dragHandleProps={{ style: { display: "none" } }} />
                    ))
                  }
                </div>
              </div>
            );
          })}
          {(() => {
            const untagged = tasks.filter((t) => t.tags.length === 0).filter((t) => {
              if (!showDone && t.state === "DONE") return false;
              if (filterState && t.state !== filterState) return false;
              return true;
            });
            if (untagged.length === 0) return null;
            return (
              <div>
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10, paddingBottom: 8, borderBottom: "1px solid #1e2333" }}>
                  <div style={{ width: 3, height: 16, borderRadius: 2, background: "#4a4744", flexShrink: 0 }} />
                  <div style={{ color: "#6a6562", fontSize: 15, fontWeight: 700 }}>Sin proyecto</div>
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                  {untagged.map((task, idx) => (
                    <TaskCard key={task.id} task={task} index={idx + 1} onUpdate={updateTask} onDelete={deleteTask} onSetActive={setActiveTaskId} isActive={task.id === activeTaskId} availableTags={availableTags} dragHandleProps={{ style: { display: "none" } }} />
                  ))}
                </div>
              </div>
            );
          })()}
        </div>
      )}

      {/* RECURRENTES VIEW */}
      {viewMode === "recurrentes" && (() => {
        const templates = tasks.filter(t => t.recurrence && !t.recurrenceParentId);
        return (
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {templates.length === 0 && (
              <div style={{ color: "#4a4744", fontSize: 15, textAlign: "center", padding: 40 }}>
                Ninguna tarea recurrente todavía — créala desde el backlog con el selector ↻
              </div>
            )}
            {templates.map((task, idx) => (
              <div key={task.id} style={{
                background: "#1e2020",
                border: "1px solid #1e2333",
                borderRadius: 14,
                padding: "0 18px",
                height: 54,
                display: "flex",
                alignItems: "center",
                gap: 12,
                transition: "border-color 0.15s",
              }}
                onMouseEnter={(e) => {
                  e.currentTarget.style.borderColor = "#3a3c3c";
                  const del = e.currentTarget.querySelector("[data-tpl-delete]");
                  if (del) del.style.opacity = "1";
                }}
                onMouseLeave={(e) => {
                  e.currentTarget.style.borderColor = "#2c2e2e";
                  const del = e.currentTarget.querySelector("[data-tpl-delete]");
                  if (del) del.style.opacity = "0";
                }}
              >
                {/* Day pill */}
                <div style={{
                  background: "#5a9ea815",
                  border: "1px solid #5a9ea830",
                  color: "#5a9ea8",
                  borderRadius: 10,
                  padding: "2px 10px",
                  fontSize: 12,
                  fontWeight: 700,
                  flexShrink: 0,
                  whiteSpace: "nowrap",
                  letterSpacing: 0.3,
                }}>
                  ↻ {DAYS_ES_PLURAL[task.recurrence.day]}
                </div>

                {/* Title */}
                <div style={{ flex: 1, color: "#e4e0db", fontSize: 15, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                  {task.title}
                </div>

                {/* Tags */}
                <div style={{ display: "flex", gap: 4, flexShrink: 0 }}>
                  {task.tags.map(t => <TagBadge key={t} tagId={t} small availableTags={availableTags} />)}
                </div>

                {/* Next spawn date */}
                {(() => {
                  const today = new Date();
                  const todayDow = today.getDay();
                  const targetDow = task.recurrence.day;
                  let daysUntil = (targetDow - todayDow + 7) % 7;
                  if (daysUntil === 0) daysUntil = 7; // already spawned today, next is in 7
                  const alreadyToday = tasks.some(t => t.recurrenceParentId === task.id && t.spawnedDate === todayStr());
                  const label = alreadyToday ? "hoy ✓" : daysUntil === 7 ? "próx. semana" : `en ${daysUntil}d`;
                  return (
                    <span style={{ color: alreadyToday ? "#7aab6a" : "#4a4744", fontSize: 12, fontWeight: 600, flexShrink: 0 }}>
                      {label}
                    </span>
                  );
                })()}

                {/* Delete template */}
                <button data-tpl-delete onClick={() => deleteTask(task.id)}
                  style={{ background: "transparent", border: "none", color: "#4a4744", cursor: "pointer", fontSize: 12, padding: "2px 4px", opacity: 0, transition: "opacity 0.15s, color 0.15s", flexShrink: 0 }}
                  onMouseEnter={(e) => (e.currentTarget.style.color = "#b85a50")}
                  onMouseLeave={(e) => (e.currentTarget.style.color = "#4a4744")}
                >✕</button>
              </div>
            ))}

            {/* Add new recurring task shortcut */}
            <div style={{ marginTop: 8 }}>
              <NewTaskForm onAdd={addTask} availableTags={availableTags} />
            </div>
          </div>
        );
      })()}


      {/* TOOLS VIEW */}
      {viewMode === "tools" && (
        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
          {checklistItems.length === 0 && newCheckItem === "" && (
            <div style={{ color: "#4a4744", fontSize: 15, textAlign: "center", padding: "32px 0" }}>
              Lista vacía — añade tu primer item abajo
            </div>
          )}
          {checklistItems.map(item => (
            <div key={item.id}
              style={{ display: "flex", alignItems: "center", gap: 10, background: "#1e2020", border: "1px solid #2c2e2e", borderRadius: 12, padding: "10px 14px", transition: "border-color 0.15s" }}
              onMouseEnter={(e) => { e.currentTarget.style.borderColor = "#3a3c3c"; const d = e.currentTarget.querySelector("[data-chk-del]"); if (d) d.style.opacity = "1"; }}
              onMouseLeave={(e) => { e.currentTarget.style.borderColor = "#2c2e2e"; const d = e.currentTarget.querySelector("[data-chk-del]"); if (d) d.style.opacity = "0"; }}
            >
              <button onClick={() => toggleCheckItem(item.id)}
                style={{ width: 16, height: 16, borderRadius: 8, border: item.done ? "1px solid #7aab6a50" : "1px solid #3a3c3c", background: item.done ? "#7aab6a18" : "transparent", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, padding: 0, transition: "all 0.15s" }}
              >
                {item.done && <span style={{ color: "#7aab6a", fontSize: 10, lineHeight: 1 }}>✓</span>}
              </button>
              <span style={{ flex: 1, fontSize: 15, color: item.done ? "#4a4744" : "#e4e0db", textDecoration: item.done ? "line-through" : "none", transition: "all 0.15s" }}>{item.text}</span>
              <button data-chk-del onClick={() => deleteCheckItem(item.id)}
                style={{ background: "transparent", border: "none", color: "#4a4744", cursor: "pointer", fontSize: 12, padding: "2px 4px", opacity: 0, transition: "opacity 0.15s, color 0.15s", flexShrink: 0 }}
                onMouseEnter={(e) => e.currentTarget.style.color = "#b85a50"}
                onMouseLeave={(e) => e.currentTarget.style.color = "#4a4744"}
              >✕</button>
            </div>
          ))}

          {/* Input row */}
          <div style={{ display: "flex", alignItems: "center", gap: 10, background: "#1e2020", border: "1px dashed #2c2e2e", borderRadius: 12, padding: "10px 14px", transition: "border-color 0.15s" }}
            onFocus={(e) => e.currentTarget.style.borderColor = "#3a3c3c"}
            onBlur={(e) => e.currentTarget.style.borderColor = "#2c2e2e"}
          >
            <div style={{ width: 16, height: 16, borderRadius: 8, border: "1px dashed #3a3c3c", flexShrink: 0 }} />
            <input ref={checkInputRef} value={newCheckItem} onChange={(e) => setNewCheckItem(e.target.value)}
              onKeyDown={(e) => { if (e.key === "Enter") addCheckItem(); }}
              placeholder="+ Añadir item"
              style={{ flex: 1, background: "transparent", border: "none", color: "#e4e0db", fontSize: 15, fontFamily: "inherit", outline: "none", padding: 0 }}
            />
          </div>

          {/* Clear done */}
          {checklistItems.some(i => i.done) && (
            <div style={{ textAlign: "center", marginTop: 8 }}>
              <button onClick={clearDoneItems}
                style={{ background: "transparent", border: "none", color: "#4a4744", fontSize: 13, cursor: "pointer", transition: "color 0.15s" }}
                onMouseEnter={(e) => e.currentTarget.style.color = "#847f7a"}
                onMouseLeave={(e) => e.currentTarget.style.color = "#4a4744"}
              >Limpiar completados</button>
            </div>
          )}
        </div>
      )}
      {/* Footer */}
      {tasks.length > 0 && (
        <div style={{ marginTop: 32, paddingTop: 16, borderTop: "1px solid #1e233350", textAlign: "center" }}>
          <button onClick={() => setShowDone(!showDone)}
            style={{ background: "transparent", border: "none", color: "#4a4744", fontSize: 13, cursor: "pointer", transition: "color 0.15s" }}
            onMouseEnter={(e) => (e.currentTarget.style.color = "#847f7a")}
            onMouseLeave={(e) => (e.currentTarget.style.color = "#4a4744")}
          >{showDone ? "Ocultar completadas" : `Mostrar completadas (${counts.done})`}</button>
        </div>
      )}
    </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<CommandCenter />);
</script>
</body>
</html>
